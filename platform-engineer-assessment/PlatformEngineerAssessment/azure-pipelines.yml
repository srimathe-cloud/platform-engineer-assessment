trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  acrName: '$(ACR_NAME)'
  acrLoginServer: '$(ACR_LOGIN_SERVER)'

steps:
- checkout: self

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: |
    dotnet restore
  displayName: 'dotnet restore'

- script: |
    dotnet build -c $(buildConfiguration) --no-restore
  displayName: 'dotnet build'

- task: AzureCLI@2
  displayName: 'Azure CLI: ACR login, docker build and push'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      set -e
      # ensure docker is available on the agent
      az acr login --name $(acrName)
      API_IMAGE=${acrLoginServer}/platformengineer-api:$(Build.BuildId)
      WORKER_IMAGE=${acrLoginServer}/platformengineer-worker:$(Build.BuildId)
      docker build -t $API_IMAGE -f PlatformEngineer.Api/Dockerfile PlatformEngineer.Api
      docker build -t $WORKER_IMAGE -f PlatformEngineer.Worker/Dockerfile PlatformEngineer.Worker
      docker push $API_IMAGE
      docker push $WORKER_IMAGE

- task: AzureCLI@2
  displayName: 'Azure CLI: Deploy to ACI'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      set -e
      API_IMAGE=${acrLoginServer}/platformengineer-api:$(Build.BuildId)
      WORKER_IMAGE=${acrLoginServer}/platformengineer-worker:$(Build.BuildId)
      # get ACR credentials
      ACR_USER=$(az acr credential show -n $(acrName) --query username -o tsv)
      ACR_PASS=$(az acr credential show -n $(acrName) --query passwords[0].value -o tsv)

      az container create -g $(TF_RESOURCE_GROUP) -n pea-api --image $API_IMAGE --registry-login-server $(acrLoginServer) --registry-username $ACR_USER --registry-password $ACR_PASS --dns-name-label pea-api-$(Build.BuildId) --ports 80

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'
    publishLocation: 'Container'
