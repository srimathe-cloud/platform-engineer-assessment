version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: PlatformEngineer.Api/Dockerfile
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AZURE_SERVICEBUS_CONNECTION_STRING=${AZURE_SERVICEBUS_CONNECTION_STRING}
      - SERVICEBUS_QUEUE_NAME=${SERVICEBUS_QUEUE_NAME:-workitems}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - TABLE_NAME=${TABLE_NAME:-processeditems}
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: PlatformEngineer.Worker/Dockerfile
    environment:
      - AZURE_SERVICEBUS_CONNECTION_STRING=${AZURE_SERVICEBUS_CONNECTION_STRING}
      - SERVICEBUS_QUEUE_NAME=${SERVICEBUS_QUEUE_NAME:-workitems}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - TABLE_NAME=${TABLE_NAME:-processeditems}

  # Optional local storage emulator for development (Azurite)
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000" # Blob/Queue/Table ports vary; table uses 10002 in some images
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000"
